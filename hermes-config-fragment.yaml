web:
  extract_backend: firecrawl
  search_backend: firecrawl

browser:
  backend: camofox

mcp_servers:
  hindsight:
    url: "http://127.0.0.1:8888/mcp/hermes-__PROFILE__/"
    enabled: true
    connect_timeout: 10
    timeout: 120

  # Optional admin endpoint. Enable temporarily only when you need multi-bank
  # management tools such as list_banks or create_bank.
  # hindsight_admin:
  #   url: "http://127.0.0.1:8888/mcp/"
  #   enabled: false
  #   connect_timeout: 10
  #   timeout: 120

  headroom:
    command: "sg"
    args:
      - "hostdocker"
      - "-c"
      - "exec docker exec -i -e HEADROOM_PROXY_URL=http://headroom-proxy:8787 hermes-headroom-mcp headroom mcp serve"
    enabled: true
    timeout: 120
