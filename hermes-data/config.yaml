# Minimal Hermes config for the compose-managed deployment.
#
# This root file is a starter/default profile example. For multi-profile use,
# keep profile-specific MCP memory wiring under:
#
#   /opt/data/profiles/<profile>/config.yaml
#
# The default config pins Hindsight to the hermes-default bank.

mcp_servers:
  hindsight:
    url: "http://127.0.0.1:8888/mcp/hermes-default/"
    enabled: true
    connect_timeout: 10
    timeout: 120

  headroom:
    command: "docker"
    args:
      - "run"
      - "--rm"
      - "-i"
      - "--network"
      - "host"
      - "--entrypoint"
      - "headroom"
      - "-e"
      - "HEADROOM_PROXY_URL=http://127.0.0.1:8787"
      - "-v"
      - "hermes-headroom-workspace:/home/nonroot/.headroom"
      - "ghcr.io/chopratejas/headroom:latest"
      - "mcp"
      - "serve"
    enabled: true
    timeout: 120
