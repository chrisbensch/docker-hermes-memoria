# Profile-local Hermes config template for rootless Docker.
#
# scripts/create-profile-rootless.sh replaces:
#   __PROFILE__ with the Hermes profile name
#   __BANK_ID__ with the Hindsight bank ID, default hermes-<profile>

# Optional Hermes runtime model. Hindsight has separate HINDSIGHT_API_LLM_*
# settings in the Compose .env file; this block controls Hermes Agent itself.
# model:
#   provider: lmstudio
#   default: your-local-model
#   base_url: http://host.docker.internal:1234/v1

web:
  extract_backend: firecrawl
  search_backend: firecrawl

browser:
  backend: camofox

mcp_servers:
  hindsight:
    url: "http://hindsight-mcp:8888/mcp/__BANK_ID__/"
    enabled: true
    connect_timeout: 10
    timeout: 120

  # Optional admin endpoint. Enable temporarily only when you need multi-bank
  # management tools such as list_banks or create_bank.
  # hindsight_admin:
  #   url: "http://hindsight-mcp:8888/mcp/"
  #   enabled: false
  #   connect_timeout: 10
  #   timeout: 120

  headroom:
    command: "docker"
    args:
      - "exec"
      - "-i"
      - "-e"
      - "HEADROOM_PROXY_URL=http://headroom-proxy:8787"
      - "hermes-headroom-mcp"
      - "headroom"
      - "mcp"
      - "serve"
    enabled: true
    timeout: 120
