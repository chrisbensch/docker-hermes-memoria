# Minimal base Hermes config for the compose-managed rootful deployment.
#
# Copy this file to appdata/hermes/config.yaml when using
# docker-compose.rootful.yml. Profile-specific MCP wiring is generated under
# appdata/hermes/profiles/<name>/ by create-profile.sh.

# Optional Hermes runtime model. Hindsight has separate HINDSIGHT_API_LLM_*
# settings in the Compose .env file; this block controls Hermes Agent itself.
# model:
#   provider: lmstudio
#   default: your-local-model
#   base_url: http://127.0.0.1:1234/v1

# Keep the base profile blank. The quickstart-created profile becomes active
# through appdata/hermes/active_profile and owns its Hindsight/Headroom config.
mcp_servers: {}
