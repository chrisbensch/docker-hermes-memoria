# Rootless Docker override.
#
# Use with:
#   DOCKER_SOCK=/run/user/$(id -u)/docker.sock \
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.rootless.yml up -d
#
# This removes host networking from Hermes services and mounts the rootless
# Docker daemon socket so Hermes can still launch stdio MCP containers. Seed
# ./appdata/hermes/config.yaml from ./hermes-data/config.rootless.yaml before
# starting this stack.

services:
  hermes:
    network_mode: !reset null
    ports:
      # Only useful when you enable Hermes' API server with API_SERVER_KEY or
      # API_SERVER_ENABLED. The API server defaults to container port 8642.
      - "${HERMES_API_BIND_HOST:-127.0.0.1}:${HERMES_API_HOST_PORT:-8642}:8642"
    environment:
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
    volumes: !override
      - ${APPDATA_DIR:-./appdata}/hermes:/opt/data
      - type: bind
        source: ${DOCKER_SOCK:-/run/user/1000/docker.sock}
        target: /var/run/docker.sock
        bind:
          create_host_path: false

  hermes-dashboard:
    network_mode: !reset null
    ports:
      - "${HERMES_DASHBOARD_BIND_HOST:-127.0.0.1}:${HERMES_DASHBOARD_HOST_PORT:-9119}:9119"
    volumes: !override
      - ${APPDATA_DIR:-./appdata}/hermes:/opt/data
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]

networks:
  default:
    name: hermes-compose-mcp-rootless
