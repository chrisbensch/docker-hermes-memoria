name: hermes-compose-mcp

services:
  hermes:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    restart: unless-stopped
    depends_on:
      hindsight-mcp:
        condition: service_healthy
      headroom-mcp:
        condition: service_started
      firecrawl-api:
        condition: service_started
    volumes:
      - ${APPDATA_DIR:-./appdata}/hermes:/opt/data
      - type: bind
        source: ${DOCKER_SOCK:-/run/user/1000/docker.sock}
        target: /var/run/docker.sock
        bind:
          create_host_path: false
    ports:
      # Only useful when you enable Hermes' API server with API_SERVER_KEY or
      # API_SERVER_ENABLED. The API server defaults to container port 8642.
      - "${HERMES_API_BIND_HOST:-127.0.0.1}:${HERMES_API_HOST_PORT:-8642}:8642"
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_HOME_MODE: ${HERMES_HOME_MODE:-0755}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["gateway", "run"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  hermes-dashboard:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    restart: unless-stopped
    depends_on:
      - hermes
    volumes:
      - ${APPDATA_DIR:-./appdata}/hermes:/opt/data
    ports:
      - "${HERMES_DASHBOARD_BIND_HOST:-127.0.0.1}:${HERMES_DASHBOARD_HOST_PORT:-9119}:9119"
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_HOME_MODE: ${HERMES_HOME_MODE:-0755}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  hindsight-mcp:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    restart: unless-stopped
    ports:
      - "${HINDSIGHT_API_BIND_HOST:-127.0.0.1}:${HINDSIGHT_API_HOST_PORT:-8888}:8888"
      - "${HINDSIGHT_UI_BIND_HOST:-127.0.0.1}:${HINDSIGHT_UI_HOST_PORT:-9999}:9999"
    environment:
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: 8888
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-}
      HINDSIGHT_API_LOG_LEVEL: ${HINDSIGHT_API_LOG_LEVEL:-info}
      HINDSIGHT_API_WORKER_ID: ${HINDSIGHT_API_WORKER_ID:-hindsight-mcp}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${APPDATA_DIR:-./appdata}/hindsight:/home/hindsight/.pg0
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  headroom-proxy:
    image: ${HEADROOM_IMAGE:-ghcr.io/chopratejas/headroom:0.27.0}
    restart: unless-stopped
    ports:
      - "${HEADROOM_PROXY_BIND_HOST:-127.0.0.1}:${HEADROOM_PROXY_HOST_PORT:-8787}:8787"
    environment:
      HEADROOM_HOST: 0.0.0.0
      HEADROOM_TELEMETRY: ${HEADROOM_TELEMETRY:-off}
      OPENAI_TARGET_API_URL: ${OPENAI_TARGET_API_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--host", "0.0.0.0", "--port", "8787"]
    volumes:
      - ${APPDATA_DIR:-./appdata}/headroom:/home/nonroot/.headroom
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  headroom-mcp:
    image: ${HEADROOM_IMAGE:-ghcr.io/chopratejas/headroom:0.27.0}
    container_name: hermes-headroom-mcp
    restart: unless-stopped
    entrypoint: ["sleep"]
    command: ["infinity"]
    environment:
      HEADROOM_PROXY_URL: http://headroom-proxy:8787
    volumes:
      - ${APPDATA_DIR:-./appdata}/headroom:/home/nonroot/.headroom
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  firecrawl-api:
    image: ${FIRECRAWL_IMAGE:-ghcr.io/firecrawl/firecrawl:latest}
    restart: unless-stopped
    ports:
      - "${FIRECRAWL_BIND_HOST:-127.0.0.1}:${FIRECRAWL_HOST_PORT:-3002}:3002"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-nuq-postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      USE_DB_AUTHENTICATION: ${FIRECRAWL_USE_DB_AUTHENTICATION:-false}
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-postgres}
      POSTGRES_HOST: firecrawl-nuq-postgres
      POSTGRES_PORT: 5432
      NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
      BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:-}
      SEARXNG_ENDPOINT: http://searxng:80
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  firecrawl-playwright:
    image: ${FIRECRAWL_PLAYWRIGHT_IMAGE:-ghcr.io/firecrawl/playwright-service:latest}
    restart: unless-stopped
    environment:
      PORT: 3000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  firecrawl-redis:
    image: ${FIRECRAWL_REDIS_IMAGE:-redis:alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${APPDATA_DIR:-./appdata}/firecrawl-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  firecrawl-rabbitmq:
    image: ${FIRECRAWL_RABBITMQ_IMAGE:-rabbitmq:3-management}
    restart: unless-stopped
    volumes:
      - ${APPDATA_DIR:-./appdata}/firecrawl-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  firecrawl-nuq-postgres:
    build:
      context: ${FIRECRAWL_SOURCE_DIR:-./.firecrawl-src}/apps/nuq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-postgres}
    volumes:
      - ${APPDATA_DIR:-./appdata}/firecrawl-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  searxng-core:
    image: ${SEARXNG_IMAGE:-searxng/searxng:latest}
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${SEARXNG_SETTINGS_FILE:-./web-search/searxng-settings.yml}
        target: /etc/searxng/settings.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./web-search/searxng-limiter.toml
        target: /etc/searxng/limiter.toml
        read_only: true
        bind:
          create_host_path: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  searxng:
    image: ${SEARXNG_NGINX_IMAGE:-nginx:alpine}
    restart: unless-stopped
    ports:
      - "${SEARXNG_BIND_HOST:-127.0.0.1}:${SEARXNG_HOST_PORT:-8889}:80"
    volumes:
      - type: bind
        source: ./web-search/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      searxng-core:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  camofox:
    image: ${CAMOFOX_IMAGE:-ghcr.io/jo-inc/camofox-browser:latest}
    restart: unless-stopped
    ports:
      - "${CAMOFOX_BIND_HOST:-127.0.0.1}:${CAMOFOX_HOST_PORT:-9377}:9377"
    environment:
      CAMOFOX_PORT: 9377
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  default:
    name: hermes-compose-mcp-rootless
